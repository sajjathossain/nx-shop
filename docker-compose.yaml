services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    container_name: db
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nx-shop
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nx-shop"]
      interval: 5s
      timeout: 5s
      retries: 5

  api-v2:
    build:
      dockerfile: Dockerfile-api-v2
      context: .
    container_name: api-v2
    ports:
      - "4000:4000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DB_HOST: db
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_DATABASE: nx-shop
      DB_SYNCHRONIZE: "true"
    restart: unless-stopped

  shop-v2:
    build:
      dockerfile: Dockerfile-shop-v2
      context: .
      args:
        NEXT_PUBLIC_API_URL: http://localhost:4000/api
    ports:
      - "3000:3000"
    depends_on:
      api-v2:
        condition: service_started
    container_name: shop-v2
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://localhost:4000/api
    restart: unless-stopped

volumes:
  pgdata:
